name: Deploy para cPanel (FTP)

# Sobe o site para o public_html do cPanel a cada push na main.
# Requer APENAS 1 secret no repo (Settings -> Secrets and variables -> Actions):
#   FTP_PASSWORD  -> senha de FTP da conta vibradadoscombr (a mesma do cPanel)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: vibradados.com.br
          username: vibradadoscombr
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps            # se der erro de TLS, troque para: ftp
          port: 21
          server-dir: public_html/  # raiz do site no cPanel
          # NÃO mexe em jinkei/ e cgi-bin/ (não estão no repo)
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            CNAME
            .nojekyll
            .gitignore
            assets/logo-vibra-marketing.png
